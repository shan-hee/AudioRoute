name: Release

on:
  push:
    branches:
      - main
    paths:
      - VERSION
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-2022

    env:
      RELEASE_SOURCE_DIR: release-assets/win-x64
      PACKAGE_DIR: artifacts/package
      RELEASE_DIR: artifacts/release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version metadata
        shell: pwsh
        run: |
          $version = (Get-Content -Raw VERSION).Trim()
          if ([string]::IsNullOrWhiteSpace($version) -or $version -notmatch '^\d+\.\d+\.\d+$') {
            throw "VERSION must use major.minor.patch format. Current value: '$version'"
          }

          $tagName = "v$version"
          $releaseName = "AudioRoute $tagName"
          $assetBaseName = "AudioRoute-$tagName-win-x64"

          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "TAG_NAME=$tagName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_NAME=$releaseName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "ASSET_BASENAME=$assetBaseName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Ensure release version is new
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $remoteTag = git ls-remote --tags origin "refs/tags/$env:TAG_NAME"
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to query remote tags from origin."
          }

          if (-not [string]::IsNullOrWhiteSpace($remoteTag)) {
            throw "Tag $env:TAG_NAME already exists on origin."
          }

          $headers = @{
            Authorization = "Bearer $env:GH_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }

          $releaseLookupUri = "https://api.github.com/repos/${{ github.repository }}/releases/tags/$env:TAG_NAME"

          try {
            $null = Invoke-RestMethod -Uri $releaseLookupUri -Headers $headers -Method Get
            throw "Release $env:TAG_NAME already exists."
          }
          catch {
            if ($_.Exception.Response -and $_.Exception.Response.StatusCode -eq [System.Net.HttpStatusCode]::NotFound) {
              Write-Host "Release $env:TAG_NAME does not exist yet."
            }
            else {
              throw
            }
          }

      - name: Validate local release payload
        shell: pwsh
        run: |
          $sourceDir = Join-Path $env:GITHUB_WORKSPACE $env:RELEASE_SOURCE_DIR
          if (-not (Test-Path $sourceDir)) {
            throw "Release source directory not found: $sourceDir"
          }

          $requiredFiles = @(
            "AudioRoute.exe",
            "AudioRoute.dll",
            "AudioRoute.runtimeconfig.json",
            "AudioRoute.deps.json",
            "AudioRoute.pri",
            "MainWindow.xbf",
            "SessionCardControl.xbf",
            "Microsoft.WindowsAppRuntime.Bootstrap.Net.dll"
          )

          foreach ($file in $requiredFiles) {
            $path = Join-Path $sourceDir $file
            if (-not (Test-Path $path)) {
              throw "Release payload is missing required file: $file"
            }
          }

      - name: Package release assets
        shell: pwsh
        run: |
          $sourceDir = (Resolve-Path (Join-Path $env:GITHUB_WORKSPACE $env:RELEASE_SOURCE_DIR)).Path
          $packageDir = Join-Path $env:GITHUB_WORKSPACE $env:PACKAGE_DIR
          $releaseDir = Join-Path $env:GITHUB_WORKSPACE $env:RELEASE_DIR
          $packageRoot = Join-Path $packageDir $env:ASSET_BASENAME
          $zipPath = Join-Path $releaseDir "$env:ASSET_BASENAME.zip"
          $hashPath = Join-Path $releaseDir "$env:ASSET_BASENAME.sha256"

          if (Test-Path $packageDir) {
            Remove-Item $packageDir -Recurse -Force
          }

          if (Test-Path $releaseDir) {
            Remove-Item $releaseDir -Recurse -Force
          }

          New-Item -ItemType Directory -Path $packageRoot -Force | Out-Null
          New-Item -ItemType Directory -Path $releaseDir -Force | Out-Null

          Copy-Item (Join-Path $sourceDir "*") -Destination $packageRoot -Recurse -Force
          Compress-Archive -Path $packageRoot -DestinationPath $zipPath -Force

          $hash = (Get-FileHash -Path $zipPath -Algorithm SHA256).Hash.ToLowerInvariant()
          Set-Content -Path $hashPath -Value "$hash  $(Split-Path $zipPath -Leaf)" -Encoding ascii

      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $releaseDir = Join-Path $env:GITHUB_WORKSPACE $env:RELEASE_DIR
          $zipAsset = Join-Path $releaseDir "$env:ASSET_BASENAME.zip"
          $hashAsset = Join-Path $releaseDir "$env:ASSET_BASENAME.sha256"

          gh release create $env:TAG_NAME $zipAsset $hashAsset --repo "${{ github.repository }}" --target "${{ github.sha }}" --title "$env:RELEASE_NAME" --generate-notes
